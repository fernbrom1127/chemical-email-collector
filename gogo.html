<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>智慧名片掃描器</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .preview-area {
            background: #f5f7fa;
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ccc;
            margin-bottom: 16px;
        }
        #preview {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            display: none;
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: transform 0.1s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-success {
            background: #10b981;
            color: white;
            display: none;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 12px;
            background: #f0fdf4;
            border-radius: 40px;
            color: #10b981;
            margin-top: 12px;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #10b981;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .result {
            margin-top: 16px;
            padding: 12px;
            border-radius: 16px;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📇 2108智慧名片掃描器</h2>
    <div class="sub">拍照或上傳名片，自動存入 Google 試算表</div>
    
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
    <button class="btn btn-primary" onclick="document.getElementById('cameraInput').click()">
        📸 開啟相機 / 選擇照片
    </button>
    
    <div class="preview-area">
        <img id="preview" src="" alt="名片預覽">
        <div id="placeholder" style="color: #999;">尚未選擇名片</div>
    </div>
    
    <button id="uploadBtn" class="btn btn-success">📤 辨識並存入 Excel</button>
    
    <div id="loading" class="loading">
        <div class="spinner"></div> 辨識中，請稍候...
    </div>
    
    <div id="result" class="result"></div>
</div>

<script>
    // 👇 請替換成你的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzkhVuE06cRn_hwXN2D3FY2JXmweHru4sbWJ-SyeyJKJ2z1FhIfJSZfGf4sbMobPRCDVg/exec";
    
    const cameraInput = document.getElementById('cameraInput');
    const preview = document.getElementById('preview');
    const placeholder = document.getElementById('placeholder');
    const uploadBtn = document.getElementById('uploadBtn');
    const loadingDiv = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    
    let currentImage = "";
    
    cameraInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        // 檢查檔案大小（限制 2MB 以內，避免 GAS 超時）
        if (file.size > 2 * 1024 * 1024) {
            alert('圖片超過 2MB，請選擇較小的圖片');
            return;
        }
        
        const reader = new FileReader();
        reader.onload = function(event) {
            currentImage = event.target.result;
            preview.src = currentImage;
            preview.style.display = 'block';
            placeholder.style.display = 'none';
            uploadBtn.style.display = 'block';
            resultDiv.style.display = 'none';
        };
        reader.readAsDataURL(file);
    });
    
    uploadBtn.addEventListener('click', async function() {
        if (!currentImage) {
            alert('請先選擇一張名片照片');
            return;
        }
        
        if (GAS_URL === "https://script.google.com/macros/s/你的網址/exec") {
            alert('請先在程式碼中設定你的 GAS 網址！');
            return;
        }
        
        loadingDiv.style.display = 'block';
        uploadBtn.disabled = true;
        resultDiv.style.display = 'none';
        
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ image: currentImage })
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            
            if (data.status === "success") {
                resultDiv.innerHTML = `
                    ✅ 資料已成功存入！<br>
                    📛 姓名：${data.name || '—'}<br>
                    📞 電話：${data.phone || '—'}<br>
                    ✉️ Email：${data.email || '—'}
                `;
                resultDiv.style.display = 'block';
                resultDiv.style.background = '#d1fae5';
                
                // 3秒後重置
                setTimeout(() => {
                    preview.style.display = 'none';
                    placeholder.style.display = 'block';
                    uploadBtn.style.display = 'none';
                    currentImage = "";
                    cameraInput.value = "";
                }, 3000);
            } else {
                resultDiv.innerHTML = `❌ 錯誤：${data.message}`;
                resultDiv.style.display = 'block';
                resultDiv.style.background = '#fee2e2';
            }
        } catch(err) {
            console.error('詳細錯誤:', err);
            resultDiv.innerHTML = `❌ 連線失敗：${err.message}<br><small>請確認 GAS 部署設定為「任何人」可存取</small>`;
            resultDiv.style.display = 'block';
            resultDiv.style.background = '#fee2e2';
        } finally {
            loadingDiv.style.display = 'none';
            uploadBtn.disabled = false;
        }
    });
</script>
</body>
</html>
