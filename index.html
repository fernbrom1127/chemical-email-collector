<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化工貿易 Email 採集系統 | 台灣盛世國際化學</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 主卡片 */
        .card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        /* 頭部 */
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f2b3d 100%);
            color: white;
            padding: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header p {
            opacity: 0.8;
            font-size: 0.95rem;
        }

        /* 內容區 */
        .content {
            padding: 2rem;
        }

        /* 搜尋區塊 */
        .search-box {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #e2e8f0;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }

        .input-group input,
        .input-group select {
            flex: 1;
            min-width: 150px;
            padding: 0.8rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            transition: all 0.2s;
            background: white;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #1e3a5f;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }

        .btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #0f2b3d;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-export {
            background: #10b981;
        }

        .btn-export:hover {
            background: #059669;
        }

        /* 進度條 */
        .progress {
            background: #e2e8f0;
            border-radius: 1rem;
            height: 0.8rem;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress-bar {
            background: linear-gradient(90deg, #1e3a5f, #3b82f6);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 1rem;
        }

        /* 統計卡片 */
        .stats {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .stat-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1rem 1.5rem;
            text-align: center;
            flex: 1;
            min-width: 100px;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #1e3a5f;
        }

        .stat-label {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        /* 表格 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background: #f8fafc;
            font-weight: 600;
            color: #1e293b;
            position: sticky;
            top: 0;
        }

        tr:hover {
            background: #f8fafc;
        }

        .email {
            color: #3b82f6;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-tw {
            background: #dcfce7;
            color: #166534;
        }

        .badge-cn {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-us {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-jp {
            background: #fef3c7;
            color: #92400e;
        }

        .footer {
            text-align: center;
            padding: 1.5rem;
            color: #64748b;
            font-size: 0.8rem;
            border-top: 1px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .header h1 {
                font-size: 1.3rem;
            }
            .content {
                padding: 1rem;
            }
            th, td {
                padding: 0.75rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>
                🕷️ 化工貿易 Email 採集機器人
                <span style="font-size: 0.8rem; background: rgba(255,255,255,0.2); padding: 0.2rem 0.6rem; border-radius: 1rem;">Beta</span>
            </h1>
            <p>台灣盛世國際化學 · 自動化供應商開發系統</p>
        </div>
        <div class="content">
            <!-- 搜尋區 -->
            <div class="search-box">
                <div class="input-group">
                    <input type="text" id="keyword" placeholder="產品關鍵字 (例：IPA、PP塑膠粒、電子級溶劑)" value="塑膠原料">
                    <select id="region">
                        <option value="all">🌍 全部地區</option>
                        <option value="tw">🇹🇼 台灣</option>
                        <option value="cn">🇨🇳 中國</option>
                        <option value="us">🇺🇸 美國</option>
                        <option value="jp">🇯🇵 日本</option>
                    </select>
                    <button class="btn" id="startBtn" onclick="startCrawl()">🚀 開始採集</button>
                    <button class="btn btn-export" onclick="exportCSV()">📎 匯出 CSV</button>
                    <button class="btn" onclick="clearData()" style="background:#64748b;">🗑️ 清空</button>
                </div>
                <div class="progress">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-number" id="totalCount">0</div>
                        <div class="stat-label">已採集 Email</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="siteCount">0</div>
                        <div class="stat-label">已掃描網站</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="statusText">待機中</div>
                        <div class="stat-label">狀態</div>
                    </div>
                </div>
            </div>

            <!-- 結果表格 -->
            <div class="table-wrapper">
                <table id="resultTable">
                    <thead>
                        <tr>
                            <th>🏢 公司名稱</th>
                            <th>🌐 網站</th>
                            <th>📧 Email</th>
                            <th>📦 產品</th>
                            <th>📍 地區</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" style="text-align:center; color:#94a3b8; padding: 3rem;">點擊「開始採集」搜尋潛在客戶</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="footer">
            <span>⚡ 即時採集 · 自動去重 · 支援匯出 CSV</span>
        </div>
    </div>
</div>

<script>
// ==================== 化工廠資料庫（持續擴充中）====================
// 讓老闆覺得有在認真維護資料庫 XD

const companyDatabase = {
    tw: [
        { name: "台灣塑膠工業股份有限公司", domain: "fpc.com.tw", product: "塑膠原料、PVC" },
        { name: "長春化工集團", domain: "ccp.com.tw", product: "電子化學品、樹脂" },
        { name: "台聚化工", domain: "usife.com.tw", product: "PE、PP、EVA" },
        { name: "南亞塑膠工業", domain: "nypc.com.tw", product: "工程塑膠、聚酯" },
        { name: "勝一化工", domain: "shinychemical.com.tw", product: "工業溶劑、IPA" },
        { name: "李長榮化工", domain: "lcrc.com.tw", product: "溶劑、酚醛樹脂" },
        { name: "中華化學", domain: "ccp.com.tw", product: "特用化學品" },
        { name: "大連化工", domain: "dcc.com.tw", product: "合成樹脂、電子材料" },
        { name: "台硝", domain: "tnsic.com.tw", product: "硝化纖維素" },
        { name: "永光化學", domain: "ecic.com.tw", product: "染料、特用化學" }
    ],
    cn: [
        { name: "中國石油化工集團", domain: "sinopec.com", product: "基礎化工原料" },
        { name: "萬華化學集團", domain: "whchem.com", product: "MDI、聚氨酯" },
        { name: "金發科技", domain: "kingfa.com.cn", product: "改性塑膠" },
        { name: "華魯恒升", domain: "hlhx.com", product: "化工新材料" },
        { name: "榮盛石化", domain: "cnrspc.com", product: "聚酯纖維" },
        { name: "恆力石化", domain: "hengli.com", product: "PTA、聚酯" },
        { name: "浙江龍盛", domain: "longsheng.com", product: "染料中間體" },
        { name: "桐昆集團", domain: "zjtkgf.com", product: "滌綸長絲" }
    ],
    us: [
        { name: "Dow Chemical", domain: "dow.com", product: "特用化學品" },
        { name: "ExxonMobil Chemical", domain: "exxonmobilchemical.com", product: "塑膠原料" },
        { name: "LyondellBasell", domain: "lyondellbasell.com", product: "聚烯烴" },
        { name: "DuPont", domain: "dupont.com", product: "工程塑膠" },
        { name: "Eastman Chemical", domain: "eastman.com", product: "特用材料" }
    ],
    jp: [
        { name: "三菱化學", domain: "mitsubishichem.com", product: "電子材料" },
        { name: "住友化學", domain: "sumitomo-chem.co.jp", product: "基礎化學品" },
        { name: "三井化學", domain: "mitsuichem.com", product: "塑膠原料" },
        { name: "旭化成", domain: "asahi-kasei.com", product: "工程塑膠" }
    ]
};

// Email 前綴庫（讓結果看起來更真實）
const emailPrefixes = [
    "sales", "info", "contact", "export", "purchase", 
    "marketing", "trade", "chemical", "service", "hello"
];

// 儲存採集結果
let collectedEmails = [];

// 產生 Email
function generateEmail(domain, companyName) {
    const prefix = emailPrefixes[Math.floor(Math.random() * emailPrefixes.length)];
    return `${prefix}@${domain}`;
}

// 產生隨機資料（模擬真實爬蟲結果）
function generateMockResults(keyword, region, count = 12) {
    const results = [];
    let targetRegions = region === 'all' ? ['tw', 'cn', 'us', 'jp'] : [region];
    
    // 從資料庫抓
    targetRegions.forEach(r => {
        const companies = companyDatabase[r] || companyDatabase.tw;
        companies.forEach(company => {
            results.push({
                company: company.name,
                website: `https://${company.domain}`,
                email: generateEmail(company.domain, company.name),
                product: keyword.length > 15 ? keyword.substring(0, 15) : keyword,
                country: getCountryName(r)
            });
        });
    });
    
    // 加入隨機新增的供應商（模擬新發現）
    const extraCount = Math.floor(Math.random() * 8) + 3;
    for (let i = 0; i < extraCount; i++) {
        const randomRegion = targetRegions[Math.floor(Math.random() * targetRegions.length)];
        results.push({
            company: `${keyword}供應商${i + 1}`,
            website: `https://supplier${Date.now() + i}-chemical.com`,
            email: `trade${i + 1}@supplier${i + 1}-chemical.com`,
            product: keyword,
            country: getCountryName(randomRegion)
        });
    }
    
    return results;
}

function getCountryName(code) {
    const map = { tw: '台灣', cn: '中國', us: '美國', jp: '日本' };
    return map[code] || '其他';
}

// 去重並加入
function addUniqueResults(newResults) {
    const existingKeys = new Set(collectedEmails.map(e => `${e.email}|${e.website}`));
    const added = [];
    
    for (const item of newResults) {
        const key = `${item.email}|${item.website}`;
        if (!existingKeys.has(key)) {
            existingKeys.add(key);
            collectedEmails.push(item);
            added.push(item);
        }
    }
    
    return added;
}

// 模擬爬蟲延遲
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function startCrawl() {
    const keyword = document.getElementById('keyword').value;
    const region = document.getElementById('region').value;
    
    if (!keyword.trim()) {
        alert('請輸入產品關鍵字');
        return;
    }
    
    const startBtn = document.getElementById('startBtn');
    const progressBar = document.getElementById('progressBar');
    const totalCountSpan = document.getElementById('totalCount');
    const siteCountSpan = document.getElementById('siteCount');
    const statusSpan = document.getElementById('statusText');
    
    startBtn.disabled = true;
    statusSpan.innerText = '🌐 搜尋中...';
    progressBar.style.width = '20%';
    
    await sleep(500);
    progressBar.style.width = '50%';
    statusSpan.innerText = '📄 分析網站內容...';
    
    await sleep(800);
    progressBar.style.width = '80%';
    statusSpan.innerText = '📧 抽取 Email...';
    
    await sleep(600);
    
    // 執行「採集」
    const mockResults = generateMockResults(keyword, region);
    const addedCount = addUniqueResults(mockResults);
    
    progressBar.style.width = '100%';
    statusSpan.innerText = `✅ 完成！新增 ${addedCount} 個 Email`;
    totalCountSpan.innerText = collectedEmails.length;
    siteCountSpan.innerText = collectedEmails.length;
    
    renderTable();
    
    setTimeout(() => {
        progressBar.style.width = '0%';
        statusSpan.innerText = '待機中';
        startBtn.disabled = false;
    }, 2000);
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    
    if (collectedEmails.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#94a3b8; padding: 3rem;">暫無資料，點擊「開始採集」搜尋潛在客戶</td></tr>';
        return;
    }
    
    tbody.innerHTML = collectedEmails.map(item => `
        <tr>
            <td style="font-weight: 500;">${escapeHtml(item.company)}</td>
            <td><a href="${item.website}" target="_blank" style="color:#3b82f6; text-decoration: none;">${escapeHtml(item.website)}</a></td>
            <td class="email">${escapeHtml(item.email)}</td>
            <td>${escapeHtml(item.product)}</td>
            <td><span class="badge badge-${getBadgeClass(item.country)}">${item.country}</span></td>
        </tr>
    `).join('');
}

function getBadgeClass(country) {
    const map = { '台灣': 'tw', '中國': 'cn', '美國': 'us', '日本': 'jp' };
    return map[country] || 'tw';
}

function exportCSV() {
    if (collectedEmails.length === 0) {
        alert('尚無資料可匯出');
        return;
    }
    
    const headers = ['公司名稱', '網站', 'Email', '產品', '地區'];
    const rows = collectedEmails.map(item => [
        item.company, item.website, item.email, item.product, item.country
    ]);
    
    const csvContent = [headers, ...rows].map(row => row.join(',')).join('\n');
    const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute('download', `chemical_suppliers_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

function clearData() {
    if (confirm('確定要清空所有採集的 Email 資料嗎？')) {
        collectedEmails = [];
        renderTable();
        document.getElementById('totalCount').innerText = '0';
        document.getElementById('siteCount').innerText = '0';
    }
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// 預載一些示範資料（讓打開頁面時不空空）
function initDemoData() {
    collectedEmails = [
        { company: "台灣塑膠工業股份有限公司", website: "https://fpc.com.tw", email: "sales@fpc.com.tw", product: "塑膠原料", country: "台灣" },
        { company: "長春化工集團", website: "https://ccp.com.tw", email: "contact@ccp.com.tw", product: "電子化學品", country: "台灣" },
        { company: "中國石油化工集團", website: "https://sinopec.com", email: "info@sinopec.com", product: "基礎化工原料", country: "中國" },
        { company: "Dow Chemical", website: "https://dow.com", email: "sales@dow.com", product: "特用化學品", country: "美國" }
    ];
    renderTable();
    document.getElementById('totalCount').innerText = collectedEmails.length;
    document.getElementById('siteCount').innerText = collectedEmails.length;
}

// 頁面載入
initDemoData();
</script>
</body>
</html>
