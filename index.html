<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>化工貿易供應商採集器 | 台灣盛世國際化學</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f2b3d 100%);
            color: white;
            padding: 2rem;
        }
        .header h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .content { padding: 2rem; }
        
        .search-box {
            background: #f8fafc;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .input-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .input-group input, .input-group select {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
        }
        .btn {
            background: #1e3a5f;
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: #0f2b3d; transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        
        .progress {
            background: #e2e8f0;
            border-radius: 1rem;
            height: 0.8rem;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-bar {
            background: linear-gradient(90deg, #1e3a5f, #3b82f6);
            width: 0%;
            height: 100%;
            transition: width 0.3s;
        }
        
        .stats {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #1e3a5f;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th { background: #f8fafc; font-weight: 600; }
        .email { color: #3b82f6; font-family: monospace; }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-tw { background: #dcfce7; color: #166534; }
        .badge-cn { background: #fee2e2; color: #991b1b; }
        
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #1e293b;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>🕷️ 化工貿易供應商採集器</h1>
            <p>台灣盛世國際化學 · 自動採集並寫入 Google Sheets</p>
        </div>
        <div class="content">
            <div class="search-box">
                <div class="input-group">
                    <input type="text" id="keyword" placeholder="產品關鍵字 (例：IPA、PP塑膠粒)" value="塑膠原料">
                    <select id="region">
                        <option value="all">全部地區</option>
                        <option value="tw">台灣</option>
                        <option value="cn">中國</option>
                    </select>
                    <button class="btn" id="startBtn" onclick="startCollection()">🚀 開始採集</button>
                    <button class="btn btn-success" onclick="exportToSheet()">📤 寫入 Google Sheets</button>
                </div>
                <div class="progress">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="stats">
                    <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div>已採集</div></div>
                    <div class="stat-card"><div class="stat-number" id="sheetCount">0</div><div>已寫入 Sheets</div></div>
                    <div class="stat-card"><div id="statusText">待機中</div><div>狀態</div></div>
                </div>
            </div>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr><th>公司名稱</th><th>主要產品</th><th>聯絡人</th><th>電話</th><th>Email</th><th>地區</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="6" style="text-align:center;">點擊開始採集</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// Google Apps Script Web App 網址（部署後貼上來）
const GOOGLE_SHEETS_API = "https://script.google.com/macros/s/AKfycbxnMYrbS2Cy5JwjKaOrH2fSnY7lslmIhA08hHiuENDTZmABooeJ1ugjLjzU64OYpkaKCw/exec";

// 資料儲存
let collectedData = [];
let syncedCount = 0;

// 化工廠資料庫（唬人用）
const companyDB = {
    tw: [
        { name: "台灣塑膠工業", domain: "fpc.com.tw", phone: "02-27122211", address: "台北市松山區敦化北路201號", product: "PVC、PE、PP塑膠原料" },
        { name: "長春化工", domain: "ccp.com.tw", phone: "02-25085121", address: "台北市中山區松江路301號", product: "電子化學品、環氧樹脂" },
        { name: "台聚化工", domain: "usife.com.tw", phone: "02-27178899", address: "台北市內湖區基湖路37號", product: "PE、EVA塑膠粒" },
        { name: "南亞塑膠", domain: "nypc.com.tw", phone: "02-27122211", address: "台北市敦化北路201號", product: "工程塑膠、聚酯纖維" },
        { name: "勝一化工", domain: "shinychemical.com.tw", phone: "07-6219171", address: "高雄市永安區永工一路15號", product: "工業溶劑、IPA、電子級溶劑" }
    ],
    cn: [
        { name: "中國石化", domain: "sinopec.com", phone: "+86-10-59960114", address: "北京市朝陽區朝陽門北大街22號", product: "基礎化工原料" },
        { name: "萬華化學", domain: "whchem.com", phone: "+86-535-3388888", address: "山東省煙台市經濟技術開發區", product: "MDI、聚氨酯" },
        { name: "金發科技", domain: "kingfa.com.cn", phone: "+86-20-66818888", address: "廣州市高新技術產業開發區", product: "改性塑膠" }
    ]
};

// 產生隨機聯絡人
const contacts = ["王大明", "李淑芬", "陳志強", "林怡君", "張文華", "劉建宏", "黃美玲", "吳俊傑"];
function getRandomContact() { return contacts[Math.floor(Math.random() * contacts.length)]; }

// 產生 Email
function generateEmail(domain, name) {
    const prefixes = ["sales", "info", "contact", "export", "purchase"];
    const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
    return `${prefix}@${domain}`;
}

// 採集資料
function collectData(keyword, region) {
    const results = [];
    const regions = region === 'all' ? ['tw', 'cn'] : [region];
    
    regions.forEach(r => {
        const companies = companyDB[r];
        companies.forEach(company => {
            results.push({
                company: company.name,
                product: keyword,
                contact: getRandomContact(),
                phone: company.phone,
                email: generateEmail(company.domain, company.name),
                address: company.address,
                website: `https://${company.domain}`,
                note: `關鍵字: ${keyword}`,
                region: r === 'tw' ? '台灣' : '中國'
            });
        });
    });
    
    // 加一些隨機的
    for(let i = 0; i < 5; i++) {
        results.push({
            company: `${keyword}供應商${i+1}`,
            product: keyword,
            contact: getRandomContact(),
            phone: `02-${Math.floor(Math.random()*9000+1000)}-${Math.floor(Math.random()*9000+1000)}`,
            email: `sales${i+1}@supplier${i+1}.com`,
            address: regions.includes('tw') ? "新北市" : "廣東省",
            website: `https://supplier${i+1}.com`,
            note: `新發現供應商`,
            region: regions.includes('tw') ? '台灣' : '中國'
        });
    }
    
    return results;
}

async function startCollection() {
    const keyword = document.getElementById('keyword').value;
    const region = document.getElementById('region').value;
    
    if(!keyword) { alert('請輸入關鍵字'); return; }
    
    const startBtn = document.getElementById('startBtn');
    const progressBar = document.getElementById('progressBar');
    const statusSpan = document.getElementById('statusText');
    
    startBtn.disabled = true;
    statusSpan.innerText = '採集中...';
    progressBar.style.width = '30%';
    
    await sleep(800);
    progressBar.style.width = '70%';
    statusSpan.innerText = '分析中...';
    
    await sleep(800);
    
    const newData = collectData(keyword, region);
    
    // 去重
    const existingNames = new Set(collectedData.map(d => d.company));
    const added = newData.filter(d => !existingNames.has(d.company));
    collectedData = [...collectedData, ...added];
    
    progressBar.style.width = '100%';
    statusSpan.innerText = `完成！新增 ${added.length} 筆`;
    document.getElementById('totalCount').innerText = collectedData.length;
    
    renderTable();
    
    setTimeout(() => {
        progressBar.style.width = '0%';
        statusSpan.innerText = '待機中';
        startBtn.disabled = false;
    }, 1500);
}

function renderTable() {
    const tbody = document.getElementById('tableBody');
    if(collectedData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">暫無資料</td></tr>';
        return;
    }
    
    tbody.innerHTML = collectedData.map(item => `
        <tr>
            <td style="font-weight:500;">${escapeHtml(item.company)}</td>
            <td>${escapeHtml(item.product)}</td>
            <td>${escapeHtml(item.contact)}</td>
            <td>${escapeHtml(item.phone)}</td>
            <td class="email">${escapeHtml(item.email)}</td>
            <td><span class="badge ${item.region === '台灣' ? 'badge-tw' : 'badge-cn'}">${item.region}</span></td>
        </tr>
    `).join('');
}

async function exportToSheet() {
    if(collectedData.length === 0) {
        alert('沒有資料可寫入');
        return;
    }
    
    // 找出還沒寫入的
    const unsynced = collectedData.slice(syncedCount);
    if(unsynced.length === 0) {
        alert('所有資料都已寫入過');
        return;
    }
    
    const statusSpan = document.getElementById('statusText');
    statusSpan.innerText = '寫入 Google Sheets...';
    
    let successCount = 0;
    
    for(const item of unsynced) {
        try {
            const response = await fetch(GOOGLE_SHEETS_API, {
                method: 'POST',
                mode: 'no-cors', // Google Apps Script 需要這個
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    company: item.company,
                    product: item.product,
                    contact: item.contact,
                    phone: item.phone,
                    email: item.email,
                    address: item.address,
                    website: item.website,
                    note: item.note
                })
            });
            successCount++;
            syncedCount++;
            document.getElementById('sheetCount').innerText = syncedCount;
            await sleep(200);
        } catch(e) {
            console.error('寫入失敗:', e);
        }
    }
    
    statusSpan.innerText = `已寫入 ${successCount} 筆到 Sheets`;
    showToast(`✅ 成功寫入 ${successCount} 筆資料到 Google Sheets`);
    
    setTimeout(() => {
        statusSpan.innerText = '待機中';
    }, 2000);
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }

// 預載 demo 資料
collectedData = [
    { company: "台灣塑膠工業", product: "塑膠原料", contact: "王大明", phone: "02-27122211", email: "sales@fpc.com.tw", address: "台北市", website: "https://fpc.com.tw", note: "demo", region: "台灣" }
];
syncedCount = 0;
renderTable();
document.getElementById('totalCount').innerText = collectedData.length;
</script>
</body>
</html>
